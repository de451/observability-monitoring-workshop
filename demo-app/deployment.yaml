apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: workshop
  labels:
    app: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
      annotations:
        # Prometheus จะ scrape metrics จาก /metrics port 8080
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: demo-app
          image: prom/prometheus:v2.48.0
          # ใช้ Prometheus image เป็น demo app เพราะมี /metrics endpoint ในตัว
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --web.listen-address=:8080
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: workshop
  labels:
    app: demo-app
spec:
  selector:
    app: demo-app
  ports:
    - port: 80
      targetPort: 8080
      name: http
---
# ServiceMonitor: บอก Prometheus ให้ scrape demo-app
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: demo-app
  namespace: monitoring
  labels:
    release: prometheus    # ต้องตรงกับ Helm release
spec:
  namespaceSelector:
    matchNames:
      - workshop
  selector:
    matchLabels:
      app: demo-app
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
